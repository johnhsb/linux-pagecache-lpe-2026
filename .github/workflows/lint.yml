name: lint & test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: |
          bash -n mitigate-cve-2026.sh
          bash -n mitigate-cve-2026_ko.sh
      - name: shellcheck (English)
        uses: docker://koalaman/shellcheck:stable
        with:
          args: --severity=warning mitigate-cve-2026.sh
      - name: shellcheck (Korean)
        uses: docker://koalaman/shellcheck:stable
        with:
          args: --severity=warning mitigate-cve-2026_ko.sh

  # Confirms the script actually works on the distros the docs claim to
  # support. AlmaLinux 8 ships bash 4.4, which validates the documented
  # "Bash 4+" floor. Runs the full lifecycle against both the English
  # (mitigate-cve-2026.sh, default) and Korean (mitigate-cve-2026_ko.sh)
  # scripts — same logic, only user-facing strings differ.
  distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:24.04
          - debian:12
          - rockylinux/rockylinux:9
          - almalinux:8
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Environment
        run: |
          . /etc/os-release; echo "$PRETTY_NAME / bash $BASH_VERSION"

      - name: Run test suite
        shell: bash
        run: |
          # GitHub Actions runs each step with 'bash -e'. These tests
          # assert non-zero exit codes as expected values, so errexit
          # must be off (otherwise the step dies at the first
          # "abnormal" exit it hits).
          set +e
          set -u
          total_fail=0

          # run_suite <script> <not-root message substring>
          # Exercises the full arg-parsing / offline-default / dry-run /
          # apply-idempotent-rollback lifecycle. Only the not-root
          # message is language-specific; everything else (exit codes)
          # is identical between the English and Korean scripts.
          run_suite() {
            local S="$1" NOTROOT_MSG="$2" fail=0
            chk() { # chk <label> <expected> <actual>
              if [ "$2" = "$3" ]; then echo "  ok   $1"
              else echo "  FAIL $1 — expected $2, got $3"; fail=$((fail+1)); fi
            }

            echo "=== $S ==="
            echo "-- argument handling --"
            bash "$S" --help    >/dev/null 2>&1; chk "--help"           0 $?
            bash "$S" --version >/dev/null 2>&1; chk "--version"        0 $?
            bash "$S" --zzz     >/dev/null 2>&1; chk "invalid argument" 2 $?
            bash "$S" --dry-run --yes >/dev/null 2>&1; chk "mutually exclusive options" 2 $?

            echo "-- must default to offline --"
            mkdir -p /tmp/nettrap
            for c in dnf apt curl wget; do
              printf '#!/bin/sh\necho NETCALL:%s >&2\nexit 1\n' "$c" > /tmp/nettrap/$c
              chmod +x /tmp/nettrap/$c
            done
            PATH=/tmp/nettrap:$PATH bash "$S" --dry-run 2>/tmp/net.txt >/dev/null || true
            if grep -q NETCALL /tmp/net.txt; then
              echo "  FAIL default run made a network call"; fail=$((fail+1))
            else
              echo "  ok   no network call on default run"
            fi
            bash "$S" --dry-run --online >/dev/null 2>&1; rc=$?
            case "$rc" in 0|10) echo "  ok   --online exit=$rc" ;;
                          *) echo "  FAIL --online exit=$rc"; fail=$((fail+1)) ;; esac

            echo "-- default output is a summary, detail is --verbose --"
            b=$(bash "$S" --dry-run 2>&1 | wc -l)
            v=$(bash "$S" --dry-run --verbose 2>&1 | wc -l)
            if [ "$b" -lt "$v" ]; then echo "  ok   default ${b} lines < verbose ${v} lines"
            else echo "  FAIL default ${b} lines >= verbose ${v} lines"; fail=$((fail+1)); fi

            echo "-- must require root --"
            useradd -m tester 2>/dev/null || true
            su tester -c "bash $PWD/$S --dry-run" >/tmp/nr.txt 2>&1; chk "non-root rejected" 1 $?
            grep -qF "$NOTROOT_MSG" /tmp/nr.txt \
              && echo "  ok   non-root guidance message shown" \
              || { echo "  FAIL non-root guidance message missing"; fail=$((fail+1)); }

            echo "-- dry-run must change nothing --"
            bash "$S" --dry-run >/dev/null 2>&1; rc=$?
            case "$rc" in 0|10) echo "  ok   dry-run exit=$rc" ;;
                          *) echo "  FAIL dry-run exit=$rc"; fail=$((fail+1)) ;; esac
            for f in /etc/modprobe.d/mitigate-cve-2026.conf \
                     /etc/sysctl.d/99-mitigate-cve-2026-userns.conf; do
              [ -e "$f" ] && { echo "  FAIL dry-run created $f"; fail=$((fail+1)); }
            done
            [ -e /etc/modprobe.d/mitigate-cve-2026.conf ] || echo "  ok   dry-run made no changes"

            echo "-- apply / idempotent / rollback lifecycle --"
            bash "$S" --rollback --yes >/dev/null 2>&1; chk "rollback from empty state" 0 $?
            bash "$S" --yes            >/dev/null 2>&1; chk "apply"                     20 $?
            bash "$S" --yes            >/dev/null 2>&1; chk "rerun (idempotent)"         0 $?
            bash "$S" --dry-run        >/dev/null 2>&1; chk "dry-run after apply"        0 $?
            bash "$S" --rollback --yes >/dev/null 2>&1; chk "rollback"                   0 $?
            [ -e /etc/modprobe.d/mitigate-cve-2026.conf ] \
              && { echo "  FAIL config file still present after rollback"; fail=$((fail+1)); } \
              || echo "  ok   config file removed after rollback"
            bash "$S" --dry-run >/dev/null 2>&1; chk "dry-run after rollback" 10 $?

            return "$fail"
          }

          run_suite mitigate-cve-2026.sh    "This script must be run as root"
          total_fail=$((total_fail + $?))
          run_suite mitigate-cve-2026_ko.sh "이 스크립트는 root 권한으로 실행해야 합니다"
          total_fail=$((total_fail + $?))

          echo
          [ "$total_fail" -eq 0 ] && echo "All checks passed" || { echo "$total_fail check(s) failed"; exit 1; }

  # CVE determination relies on the kernel package changelog, so a fake
  # rpm is injected to exercise the decision path directly. If this logic
  # is wrong, a vulnerable server gets skipped (fail-open), so this has
  # the highest regression value. Verified against both scripts since
  # they share identical decision logic, only output strings differ.
  cve-decision:
    runs-on: ubuntu-latest
    container:
      image: almalinux:8
    steps:
      - uses: actions/checkout@v4

      - name: Inject fake rpm and assert decisions
        shell: bash
        run: |
          set +e   # same reason as above (non-zero exit codes are expected values)
          set -u
          mkdir -p /fake
          cat > /fake/rpm <<'RPM'
          #!/bin/bash
          if [ "$1" = "-q" ] && [ "$2" = "--changelog" ]; then printf '%s\n' "$FAKE_CHANGELOG"; exit 0; fi
          if [ "$1" = "-q" ]; then exit 0; fi
          exit 1
          RPM
          chmod +x /fake/rpm
          export PATH=/fake:$PATH
          total_fail=0

          # run_decisions <script> <"modules to block" line prefix>
          run_decisions() {
            local S="$1" PREFIX="$2" fail=0

            plan_of() { # plan_of <changelog> [options] -> blocked-module string
              # The "modules to block" line only appears with --verbose (default output is a summary).
              FAKE_CHANGELOG="$1" bash "$S" --dry-run --verbose ${2:-} 2>&1 \
                | sed -n "s/^${PREFIX}//p"
            }
            expect() { # expect <label> <expected> <actual>
              if [ "$2" = "$3" ]; then echo "  ok   $1"
              else echo "  FAIL $1 — expected [$2] got [$3]"; fail=$((fail+1)); fi
            }

            echo "=== $S ==="
            # Red Hat family, so 43500 (rxrpc) is always excluded on primary-source grounds.
            expect "no changelog" \
                   "esp4 esp6 algif_aead act_pedit" "$(plan_of '')"

            expect "all 6 listed as patched -> nothing left" \
                   "" "$(plan_of 'CVE-2026-31431 CVE-2026-43284 CVE-2026-43500 CVE-2026-46300 CVE-2026-43503 CVE-2026-46331')"

            expect "only 31431 patched -> algif_aead excluded" \
                   "esp4 esp6 act_pedit" "$(plan_of 'fix CVE-2026-31431')"

            # esp must stay an action target when 43503 is absent from the
            # changelog. Pinned so a vendor-exception shortcut around this
            # doesn't get reintroduced.
            expect "43503 unconfirmed -> esp included (fail-safe)" \
                   "esp4 esp6 algif_aead act_pedit" "$(plan_of 'CVE-2026-43284 CVE-2026-46300')"

            expect "only 46331 patched -> act_pedit excluded" \
                   "esp4 esp6 algif_aead" "$(plan_of 'fix CVE-2026-46331')"

            expect "unsupported flag is an argument error (exit 2)" \
                   "2" "$(bash "$S" --trust-vendor-exceptions >/dev/null 2>&1; echo $?)"

            return "$fail"
          }

          run_decisions mitigate-cve-2026.sh    "Modules to block: "
          total_fail=$((total_fail + $?))
          run_decisions mitigate-cve-2026_ko.sh "차단 대상 모듈: "
          total_fail=$((total_fail + $?))

          echo
          [ "$total_fail" -eq 0 ] && echo "CVE decision logic passed" || { echo "$total_fail check(s) failed"; exit 1; }
